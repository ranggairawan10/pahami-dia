<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teman Tumbuh — Hero Illustration</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    background: #FFFBF2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .wrap {
    width: 100%;
    max-width: 1200px;
    padding: 0;
  }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="wrap">

<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- ===== BACKGROUND ===== -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#FFFBF2"/>
    <stop offset="55%"  stop-color="#FAF3E2"/>
    <stop offset="100%" stop-color="#EDE2CB"/>
  </linearGradient>

  <!-- ===== CENTRAL GLOW ===== -->
  <radialGradient id="cGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#FFF8DC" stop-opacity="1"/>
    <stop offset="25%"  stop-color="#FAEDB8" stop-opacity="0.75"/>
    <stop offset="55%"  stop-color="#D6A84F" stop-opacity="0.20"/>
    <stop offset="80%"  stop-color="#CCFBF1" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#FFFBF2" stop-opacity="0"/>
  </radialGradient>

  <!-- ===== FIGURE GRADIENTS ===== -->
  <linearGradient id="mBodyGrad" x1="0.15" y1="0" x2="0.85" y2="1">
    <stop offset="0%"   stop-color="#1D9088"/>
    <stop offset="100%" stop-color="#0A5C58"/>
  </linearGradient>

  <linearGradient id="mSeatGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#0D6B64"/>
    <stop offset="100%" stop-color="#094E4A"/>
  </linearGradient>

  <linearGradient id="fBodyGrad" x1="0.15" y1="0" x2="0.85" y2="1">
    <stop offset="0%"   stop-color="#0F766E"/>
    <stop offset="100%" stop-color="#074E49"/>
  </linearGradient>

  <linearGradient id="hijabGrad" x1="0.1" y1="0" x2="0.9" y2="1">
    <stop offset="0%"   stop-color="#139188"/>
    <stop offset="100%" stop-color="#0A6560"/>
  </linearGradient>

  <linearGradient id="hijabInner" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#0C706A"/>
    <stop offset="100%" stop-color="#074E49"/>
  </linearGradient>

  <linearGradient id="skinGrad" x1="0" y1="0" x2="0.4" y2="1">
    <stop offset="0%"   stop-color="#DDA070"/>
    <stop offset="100%" stop-color="#C47858"/>
  </linearGradient>

  <linearGradient id="skinLight" x1="0" y1="0" x2="0.4" y2="1">
    <stop offset="0%"   stop-color="#E8AE85"/>
    <stop offset="100%" stop-color="#D08C68"/>
  </linearGradient>

  <!-- ===== PHONE GRADIENTS ===== -->
  <linearGradient id="phoneBody" x1="0.2" y1="0" x2="0.8" y2="1">
    <stop offset="0%"   stop-color="#242E38"/>
    <stop offset="100%" stop-color="#131A22"/>
  </linearGradient>

  <linearGradient id="screenGrad" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%"   stop-color="#E2FDF8"/>
    <stop offset="100%" stop-color="#9EEED8"/>
  </linearGradient>

  <radialGradient id="screenGlow" cx="45%" cy="35%" r="65%">
    <stop offset="0%"   stop-color="#CCFBF1" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="phoneAura" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#CCFBF1" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#CCFBF1" stop-opacity="0"/>
  </radialGradient>

  <!-- ===== SEAT SHADOW ===== -->
  <radialGradient id="seatShadow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0F766E" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
  </radialGradient>

  <!-- ===== CUSHION ===== -->
  <radialGradient id="cushionGrad" cx="40%" cy="30%" r="70%">
    <stop offset="0%"   stop-color="#EDD9B8"/>
    <stop offset="100%" stop-color="#D8C09A"/>
  </radialGradient>

  <!-- ===== VIGNETTE ===== -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#FFFBF2" stop-opacity="0"/>
    <stop offset="100%" stop-color="#DDD0B0" stop-opacity="0.09"/>
  </radialGradient>

  <!-- ===== FILTERS ===== -->

  <!-- Soft drop shadow for figures -->
  <filter id="figShadow" x="-25%" y="-20%" width="150%" height="150%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
    <feOffset in="blur" dx="0" dy="7" result="offset"/>
    <feFlood flood-color="#17202A" flood-opacity="0.11" result="fc"/>
    <feComposite in="fc" in2="offset" operator="in" result="shadow"/>
    <feMerge>
      <feMergeNode in="shadow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Soft glow for central light & phone auras -->
  <filter id="fGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Small glow for phone screen -->
  <filter id="screenBloom" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Paper grain texture -->
  <filter id="fGrain" x="0%" y="0%" width="100%" height="100%"
          color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4"
                  stitchTiles="stitch" result="noise"/>
    <feColorMatrix in="noise" type="saturate" values="0" result="gn"/>
    <feBlend in="SourceGraphic" in2="gn" mode="multiply" result="blended"/>
    <feComposite in="blended" in2="SourceGraphic" operator="in"/>
  </filter>

</defs>
